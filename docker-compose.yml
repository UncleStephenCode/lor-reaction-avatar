services:
  lor-reaction-avatar:
    build:
      context: .
      dockerfile: Dockerfile
      network: host
      args:
        APP_UID: "${LOR_UID:-1000}"
        APP_GID: "${LOR_GID:-1000}"
    user: "${LOR_UID:-1000}:${LOR_GID:-1000}"
    container_name: lor-reaction-avatar
    restart: unless-stopped
    volumes:
      - ./configs:/app/configs:Z
      - ./avatar:/app/avatar:Z
      - ./data:/app/data:Z
    command: ["--print-proxy"]
